services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: airbnb_user
      POSTGRES_PASSWORD: airbnb_pass
      POSTGRES_DB: airbnb_db
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

volumes:
  pgdata: